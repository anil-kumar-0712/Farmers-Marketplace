<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Farmer Marketplace</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">🌱 Farmer Marketplace</a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="index.html#about">About</a></li>
        <li><a href="buyer.html">Marketplace</a></li>
        <li><a href="prediction.html">Demand Prediction</a></li>
        <li><a href="login.html" class="btn-nav">Login</a></li>
      </ul>
    </div>
  </nav>

  <!-- Login Section -->
  <section class="login-section">
    <div class="login-container">
      <h1>Welcome to Farmer Marketplace</h1>
      <p class="login-subtitle">Select your role to continue</p>

      <!-- Role Selection -->
      <div class="role-selection">
        <button class="role-btn" data-role="farmer">
          <span class="role-icon">👨‍🌾</span>
          <span class="role-label">Farmer</span>
          <span class="role-desc">Sell your crops</span>
        </button>
        <button class="role-btn" data-role="buyer">
          <span class="role-icon">🛒</span>
          <span class="role-label">Buyer</span>
          <span class="role-desc">Buy crops from farmers</span>
        </button>
        <button class="role-btn" data-role="admin">
          <span class="role-icon">👩‍💼</span>
          <span class="role-label">Admin</span>
          <span class="role-desc">Manage platform</span>
        </button>
      </div>

      <!-- Login / Register Form -->
      <div id="auth-form-container" class="form-section auth-form" style="display: none;">
        <div class="auth-tabs">
          <button class="auth-tab active" data-mode="login">Login</button>
          <button class="auth-tab" data-mode="register" id="register-tab">Register</button>
        </div>

        <!-- Login Form -->
        <form id="login-form">
          <div class="form-group">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" placeholder="Enter your email" required>
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" placeholder="Enter your password" required>
          </div>
          <button type="submit" class="btn-submit">Login</button>
        </form>

        <!-- Register Form (Farmer & Buyer only) -->
        <form id="register-form" style="display: none;">
          <div class="form-group">
            <label for="reg-name">Name</label>
            <input type="text" id="reg-name" placeholder="Enter your full name" required>
          </div>
          <div class="form-group">
            <label for="reg-email">Email</label>
            <input type="email" id="reg-email" placeholder="Enter your email" required>
          </div>
          <div class="form-group" id="reg-mobile-group">
            <label for="reg-mobile">Mobile</label>
            <input type="tel" id="reg-mobile" placeholder="Enter your mobile number">
          </div>
          <div class="form-group">
            <label for="reg-password">Password</label>
            <input type="password" id="reg-password" placeholder="Create a password (min 6 characters)" required minlength="6">
          </div>
          <button type="submit" class="btn-submit">Register</button>
        </form>
      </div>

      <p class="back-link" id="back-link" style="display: none;">
        <a href="#" onclick="showRoleSelection()">← Back to role selection</a>
      </p>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-bottom">
      &copy; 2024 Farmer Marketplace. All rights reserved.
    </div>
  </footer>

  <script src="js/login.js"></script>
</body>
</html>
